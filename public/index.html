<html lang="no">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<meta name="apple-mobile-web-app-status-bar-style" content="default"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --or:#F0522B;--orl:#FF7A4D;--orp:#FFEDE6;
  --re:#D93A17;
  --g50:#F7F7F6;--g100:#EFEFED;--g200:#DDDDD9;
  --g400:#9B9B94;--g600:#6B6B63;--g800:#2A2A26;--g900:#141410;
  --gr:#1A9455;--grp:#E6F5EE;
  --bl:#2E63F0;--blp:#E7EEFD;
  --pu:#6A2DBB;--pup:#F0EAFA;
  --max:1240px;
  --glass:rgba(255,255,255,.60);
  --glass-strong:rgba(255,255,255,.80);
  --glass-brd:rgba(255,255,255,.70);
  --blur:blur(18px) saturate(180%);
  --glass-sh:0 8px 30px rgba(20,20,16,.10);
  --glass-hi:inset 0 1px 0 rgba(255,255,255,.75);
}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;color:var(--g900);-webkit-font-smoothing:antialiased;
  background:
    radial-gradient(1100px 700px at 8% -12%, rgba(240,82,43,.16), transparent 60%),
    radial-gradient(1000px 720px at 112% 6%, rgba(46,99,240,.14), transparent 55%),
    radial-gradient(900px 900px at 50% 120%, rgba(240,82,43,.07), transparent 60%),
    linear-gradient(180deg,#F3F1EF,#ECEAE8);
  background-attachment:fixed;}
.app-shell{max-width:var(--max);margin:0 auto;min-height:100vh;background:transparent;}
button{cursor:pointer;border:none;font-family:inherit;background:none;}
input,select,textarea{font-family:inherit;}
.hs::-webkit-scrollbar{display:none;}.hs{-ms-overflow-style:none;scrollbar-width:none;}
@keyframes fu{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes su{from{opacity:0;transform:translateY(100%);}to{opacity:1;transform:translateY(0);}}
@keyframes sp{to{transform:rotate(360deg);}}
.fu{animation:fu .22s ease forwards;}
.su{animation:su .28s cubic-bezier(.16,1,.3,1) forwards;}
.spin{animation:sp .7s linear infinite;}
.card{background:var(--glass);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-radius:18px;border:1px solid var(--glass-brd);box-shadow:var(--glass-sh),var(--glass-hi);}
.fi{width:100%;border:1px solid var(--glass-brd);border-radius:12px;padding:11px 13px;font-size:14px;font-weight:500;color:var(--g900);background:var(--glass-strong);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);outline:none;transition:border-color .15s,box-shadow .15s;box-shadow:var(--glass-hi);}
.fi:focus{border-color:var(--or);box-shadow:0 0 0 3px rgba(240,82,43,.16);}
.ta{width:100%;border:1.5px solid var(--g200);border-radius:10px;padding:11px 13px;font-size:14px;font-weight:500;color:var(--g900);background:white;outline:none;resize:vertical;transition:border-color .15s;}
.ta:focus{border-color:var(--or);box-shadow:0 0 0 3px rgba(240,82,43,.12);}
.lbl{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--g400);margin-bottom:6px;}
.bp{background:linear-gradient(135deg,var(--orl),var(--or) 45%,var(--re));color:white;font-weight:700;border-radius:12px;transition:transform .12s,box-shadow .15s,filter .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;height:38px;padding:0 14px;font-size:13px;flex-shrink:0;box-shadow:0 6px 18px rgba(240,82,43,.34),inset 0 1px 0 rgba(255,255,255,.45);}
.bp:hover{filter:brightness(1.05);box-shadow:0 9px 26px rgba(240,82,43,.44),inset 0 1px 0 rgba(255,255,255,.5);}
.bp:active{transform:scale(.97);opacity:.9;}.bp.wide{width:100%;height:42px;font-size:14px;padding:0 16px;}
.bs{background:var(--glass);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);color:var(--g800);font-weight:700;border-radius:12px;transition:transform .12s,box-shadow .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;height:38px;padding:0 14px;font-size:13px;flex-shrink:0;border:1px solid var(--glass-brd);box-shadow:0 3px 12px rgba(20,20,16,.07),var(--glass-hi);}.bs:hover{box-shadow:0 7px 20px rgba(20,20,16,.11),var(--glass-hi);}
.bs:active{transform:scale(.97);}.bs.wide{width:100%;height:42px;font-size:14px;padding:0 16px;}
#toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--g900);color:white;padding:9px 18px;border-radius:999px;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s;pointer-events:none;z-index:9999;white-space:nowrap;}
#toast.on{opacity:1;}
.bnav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1.5px solid var(--g200);display:flex;padding-bottom:env(safe-area-inset-bottom,0px);z-index:20;height:60px;}@media(min-width:700px){.bnav{left:50%;transform:translateX(-50%);width:var(--max);border-left:1.5px solid var(--g200);border-right:1.5px solid var(--g200);}}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;font-size:9px;font-weight:700;letter-spacing:.4px;color:var(--g400);text-transform:uppercase;gap:3px;}
.nbtn.on{color:var(--or);}
.nbtn svg{width:20px!important;height:20px!important;}
.msg-blk{background:var(--orp);border-left:3px solid var(--or);border-radius:8px;padding:10px 12px 10px 12px;font-size:13.5px;line-height:1.55;color:var(--g800);font-style:italic;margin-bottom:12px;position:relative;padding-right:70px;}
.cpbtn{position:absolute;top:6px;right:6px;background:var(--or);color:white;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;font-style:normal;border:none;cursor:pointer;}
.lvlbdg{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.3px;}
.l1{background:var(--orp);color:var(--or);}
.l2{background:#FEF0F0;color:var(--re);}
.l3{background:var(--grp);color:var(--gr);}
.l4{background:var(--pup);color:var(--pu);}
.l5{background:#E6FAF5;color:#0D7A5F;}
.tab-on{background:linear-gradient(135deg,var(--orl),var(--or) 45%,var(--re));color:white;box-shadow:0 6px 18px rgba(240,82,43,.36),inset 0 1px 0 rgba(255,255,255,.4);}
.tab-off{background:var(--glass);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);color:var(--g600);border:1px solid var(--glass-brd);box-shadow:var(--glass-hi);}
.mo-overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;}@media(min-width:700px){.mo-overlay{align-items:center;padding:20px;}}.mo-sheet{background:var(--glass-strong);-webkit-backdrop-filter:blur(30px) saturate(180%);backdrop-filter:blur(30px) saturate(180%);width:100%;max-width:460px;border-radius:20px 20px 0 0;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;}@media(min-width:700px){.mo-sheet{border-radius:16px;}}
.obtn{padding:9px 6px;border-radius:10px;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;border:1.5px solid var(--g200);background:white;color:var(--g700);}
.obtn.ob{background:var(--grp);border-color:var(--gr);color:var(--gr);}
.obtn.os{background:var(--blp);border-color:var(--bl);color:var(--bl);}
.obtn.ov{background:var(--orp);border-color:var(--or);color:var(--or);}
.obtn.oi{background:#FEF0F0;border-color:var(--re);color:var(--re);}
.scard{background:var(--glass);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-radius:16px;border:1px solid var(--glass-brd);padding:14px 16px;box-shadow:var(--glass-sh),var(--glass-hi);}
.snum{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:900;color:var(--g900);line-height:1;}
.slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px;}
.msec{background:var(--glass);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-radius:16px;border:1px solid var(--glass-brd);overflow:hidden;margin-bottom:12px;box-shadow:var(--glass-sh),var(--glass-hi);}
.mhdr{padding:12px 14px;background:linear-gradient(135deg,var(--orp),white);border-bottom:1.5px solid var(--g200);display:flex;align-items:center;justify-content:space-between;}
.mtxt{width:100%;min-height:80px;border:1.5px solid var(--g200);border-radius:10px;padding:10px 12px;font-size:13.5px;line-height:1.55;color:var(--g800);background:var(--g50);outline:none;resize:vertical;}
.mtxt:focus{border-color:var(--or);background:white;box-shadow:0 0 0 3px rgba(240,82,43,.1);}
.loader-full{position:fixed;inset:0;background:white;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:100;}
.dot-badge{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--gr);margin-left:6px;vertical-align:middle;}
.dot-badge.red{background:var(--re);}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:4px;}
.action-grid button{height:38px;font-size:13px;}
.action-grid .span2{grid-column:span 2;width:100%;height:38px;font-size:13px;border:none;}
.appbar{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.55);-webkit-backdrop-filter:blur(22px) saturate(180%);backdrop-filter:blur(22px) saturate(180%);border-bottom:1px solid var(--glass-brd);box-shadow:0 4px 24px rgba(20,20,16,.06);}
.topnav{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:11px;font-size:13.5px;font-weight:700;color:var(--g600);transition:all .15s;background:transparent;}
.topnav:hover{background:rgba(255,255,255,.5);}
.topnav.on{background:var(--orp);color:var(--or);box-shadow:var(--glass-hi);}
.topnav svg{width:17px;height:17px;}
.leadgrid{display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:760px){.leadgrid{grid-template-columns:repeat(2,1fr);}}
@media(min-width:1120px){.leadgrid{grid-template-columns:repeat(3,1fr);}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
:focus-visible{outline:2px solid var(--bl);outline-offset:2px;}
</style>
</head>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

// ── SUPABASE CONFIG ──
const SUPABASE_URL = 'https://krawpaxzwygnvoueykcc.supabase.co';

const addWeekdays=(start,n)=>{let d=new Date(start),a=0;while(a<n){d.setDate(d.getDate()+1);if(d.getDay()!==0&&d.getDay()!==6)a++;}return d;};
const fmtDate=d=>d instanceof Date?d.toISOString().split('T')[0]:d||'';
const todayStr=()=>fmtDate(new Date());
const toast=msg=>{const el=document.getElementById('toast');if(!el)return;el.textContent=msg;el.classList.add('on');setTimeout(()=>el.classList.remove('on'),2000);};

const DEFAULT_MSGS={
  'Første kontakt':'Hei {name}! Ser at dere er aktive på sosiale medier. Vi hjelper bedrifter med å bli synlige i AI-søk som ChatGPT og Gemini – uten at dere trenger å gjøre noe selv. Jeg sjekket akkurat hva ChatGPT svarer om dere. Vil du at jeg sender deg rapporten?',
  'Oppfølging 1':'Hei igjen {name}! Vil bare høre om dere fikk sett på meldingen min? Sjekket AI-synligheten deres – det var noe interessant der. Send deg?',

};

const MAIN_TABS=['LEADs','Kontakt i dag','Venter','Svart','Ikke svart','Oppfølging'];

// ── ICONS ── (alle har eksplisitt width/height så de aldri ekspanderer)
const SZ={width:16,height:16};
const Ic={
  Search:()=><svg {...SZ} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>,
  Edit:()=><svg {...SZ} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,

  Check:()=><svg {...SZ} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  Msg:()=><svg {...SZ} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
  Cal:()=><svg {...SZ} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
  Users:()=><svg {...SZ} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
  Plus:()=><svg {...SZ} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,

// ── LEVEL BADGE ──
function LevelBadge({level}){
  const cls=level==='Første kontakt'?'l1':level==='Møte booket'?'l3':level==='Siste venting'?'l4':level==='Varm oppfølging'?'l5':'l2';
  return <span className={`lvlbdg ${cls}`}>{level}</span>;
}

// ── EDIT MODAL ──
function EditModal({lead,onClose,onSave,saving}){
  const [f,setF]=useState({...lead});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const quick=t=>{
    if(t==='booket')setF(p=>({...p,status:'Svart',level:'Møte booket'}));
    else if(t==='svart')setF(p=>({...p,status:'Svart'}));
    else if(t==='venter')setF(p=>({...p,status:'Venter',next_contact:p.next_contact||fmtDate(addWeekdays(new Date(),3))}));
    else if(t==='ikke')setF(p=>({...p,status:'Ikke svart'}));
  };
  return(
    <div className="mo-overlay su" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="mo-sheet">
        <div style={{background:'white',padding:'15px 18px',borderBottom:'1.5px solid var(--g200)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <span style={{fontFamily:'Barlow Condensed',fontWeight:900,fontSize:20}}>Rediger Lead</span>
          <button onClick={onClose} style={{background:'var(--g100)',borderRadius:'50%',width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--g600)'}}><Ic.X/></button>
        </div>
        <div style={{padding:'15px',overflowY:'auto',flex:1,WebkitOverflowScrolling:'touch'}}>
          <div style={{background:'white',borderRadius:12,border:'1.5px solid var(--g200)',padding:'12px',marginBottom:14}}>
            <div className="lbl" style={{marginBottom:9}}>Hva har skjedd?</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              <button className={`obtn ${f.level==='Møte booket'?'ob':''}`} onClick={()=>quick('booket')}><Ic.Hand/>Booket møte</button>
              <button className={`obtn ${f.status==='Svart'&&f.level!=='Møte booket'?'os':''}`} onClick={()=>quick('svart')}><Ic.Msg/>Fått svar</button>
              <button className={`obtn ${f.status==='Venter'?'ov':''}`} onClick={()=>quick('venter')}><Ic.Cal/>Sett på vent</button>
              <button className={`obtn ${f.status==='Ikke svart'?'oi':''}`} onClick={()=>quick('ikke')}><Ic.X/>Ikke svart</button>
            </div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div><label className="lbl">Bedriftsnavn</label><input className="fi" value={f.name||''} onChange={e=>s('name',e.target.value)}/></div>
            <div><label className="lbl">Telefon</label><input className="fi" value={f.phone||''} onChange={e=>s('phone',e.target.value)} type="tel"/></div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <div><label className="lbl">Bransje</label><input className="fi" value={f.bransje||''} onChange={e=>s('bransje',e.target.value)} placeholder="f.eks bilpleie"/></div>
              <div><label className="lbl">By</label><input className="fi" value={f.by||''} onChange={e=>s('by',e.target.value)} placeholder="f.eks Oslo"/></div>
            </div>

function Stats({leads}){
  const dms=leads.filter(l=>l.status!=='LEADs'&&!(l.status==='Ikke svart'&&l.level==='Første kontakt')).length;
  const reps=leads.filter(l=>l.status==='Svart'||l.level==='Møte booket').length;
  const bkd=leads.filter(l=>l.level==='Møte booket').length;
  const act=leads.filter(l=>l.status==='Venter'||l.status==='Kontakt i dag').length;
  const cr=dms>0?Math.round(reps/dms*100):0;
  const br=reps>0?Math.round(bkd/reps*100):0;

  // Bransje breakdown
  const bransjeMap={};
  leads.forEach(l=>{if(l.bransje){bransjeMap[l.bransje]=(bransjeMap[l.bransje]||0)+1;}});
  const topBransjer=Object.entries(bransjeMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

    <div style={{padding:'16px',paddingBottom:100}}>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
        {[['DMs sendt',dms,'var(--or)'],['Svar mottatt',reps,'var(--bl)'],['Svar-rate',cr+'%','var(--gr)'],['Booking-rate',br+'%','var(--pu)']].map(([l,v,c])=>(
          <div key={l} className="scard">
            <div className="slbl" style={{color:c}}>{l}</div>
            <div className="snum">{v}</div>

      </div>
      <div style={{background:'var(--g900)',borderRadius:14,padding:'15px 16px',marginBottom:12,display:'flex',alignItems:'center',gap:12}}>
        <div style={{color:'var(--or)',flexShrink:0}}><Ic.Users/></div>
        <div>
          <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.6px',color:'var(--g400)',marginBottom:2}}>Aktive i trakten</div>
          <div><span style={{fontFamily:'Barlow Condensed',fontWeight:900,fontSize:30,color:'white'}}>{act}</span> <span style={{fontSize:13,color:'var(--g400)',fontWeight:500}}>leads bearbeides nå</span></div>
        </div>

        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.6px',color:'var(--g400)',marginBottom:8}}>Per fane</div>
        {MAIN_TABS.map(tab=>(

// ── MAIN APP ──
function App(){
  const [leads,setLeads]=useState([]);
  const [henterNye,setHenterNye]=useState(false);
  const [activeTab,setActiveTab]=useState('LEADs');
  const [navTab,setNavTab]=useState('leads');
  const [search,setSearch]=useState('');
  const [editing,setEditing]=useState(null);
  const [savingEdit,setSavingEdit]=useState(false);
  const [messages,setMessages]=useState({...DEFAULT_MSGS});
  const [loading,setLoading]=useState(true);
  const [online,setOnline]=useState(navigator.onLine);
  const [pullCount,setPullCount]=useState(30);
  const channelRef=useRef(null);

  useEffect(()=>{
    const on=()=>setOnline(true);
    const off=()=>setOnline(false);
    window.addEventListener('online',on);
    window.addEventListener('offline',off);
    return()=>{window.removeEventListener('online',on);window.removeEventListener('offline',off);};
  },[]);

  // Initial load
  useEffect(()=>{
    Promise.all([loadLeads(),loadMessages()]).finally(()=>setLoading(false));
    setupRealtime();
    return()=>{if(channelRef.current)sb.removeChannel(channelRef.current);};
  },[]);

  const loadLeads=async()=>{
    const td=todayStr();
    const {data,error}=await sb.from('crm_leads').select('*').order('created_at',{ascending:false});
    if(error){toast('Feil ved henting av leads');return;}
    // Auto-flytt overdue venter-leads
    const toUpdate=[];
    const processed=(data||[]).map(l=>{
      if(l.status==='Venter'&&l.next_contact&&l.next_contact<=td){
        const u=l.level==='Siste venting'?{...l,status:'Ikke svart',next_contact:null}:{...l,status:'Kontakt i dag'};
        toUpdate.push(u);return u;
      }
      // Auto-flytt Oppfølging-leads når datoen er nådd
      if(l.status==='Oppfølging'&&l.next_contact&&l.next_contact<=td){
        const u={...l,status:'Kontakt i dag',level:'Varm oppfølging'};
        toUpdate.push(u);return u;
      }
      return l;
    });
    setLeads(processed);
    if(toUpdate.length>0){
      await Promise.all(toUpdate.map(l=>sb.from('crm_leads').update({status:l.status,next_contact:l.next_contact}).eq('id',l.id)));
    }
  };

  const loadMessages=async()=>{
    try{
      const {data,error}=await sb.from('crm_messages').select('*');
      if(!error&&data&&data.length>0){
        // Merge Supabase data on top of defaults (Supabase wins if row exists)
        const m={...DEFAULT_MSGS};
        data.forEach(r=>{m[r.id]=r.tekst;});
        setMessages(m);
      }
      // If Supabase empty or error: keep DEFAULT_MSGS already in state
    }catch(e){
      // Network error: keep defaults
    }
  };

  // Realtime: leads oppdateres automatisk på alle enheter
  const setupRealtime=()=>{
    channelRef.current=sb.channel('crm_leads_changes')
      .on('postgres_changes',{event:'*',schema:'public',table:'crm_leads'},(payload)=>{
        if(payload.eventType==='INSERT'){
          setLeads(prev=>[payload.new,...prev]);
        } else if(payload.eventType==='UPDATE'){
          setLeads(prev=>prev.map(l=>l.id===payload.new.id?payload.new:l));
        } else if(payload.eventType==='DELETE'){
          setLeads(prev=>prev.filter(l=>l.id!==payload.old.id));
        }
      })
      .subscribe();
  };

  const hentNyeLeads=async()=>{
    if(henterNye)return;
    setHenterNye(true);
    toast('Henter nye bedrifter…');
    try{
      const r=await fetch('/api/hent-leads',{method:'POST'});
      const j=await r.json();
      if(j.feil){toast(j.melding||('Feil: '+(j.feil===true?'sjekk billing/nøkkel':j.feil)));}
      else{toast(j.melding||('La til '+(j.lagt_til||0)+' nye'));await loadLeads();}
    }catch(e){toast('Noe gikk galt: '+e.message);}
    finally{setHenterNye(false);}
  };

  const pullDailyLeads=async()=>{
    const toUpdate=leads.filter(l=>l.status==='LEADs').slice(0,pullCount);
    if(toUpdate.length===0){toast('Ingen leads å hente');return;}
    const ids=toUpdate.map(l=>l.id);
    const {error}=await sb.from('crm_leads').update({status:'Kontakt i dag'}).in('id',ids);
    if(!error){
      setLeads(prev=>prev.map(l=>ids.includes(l.id)?{...l,status:'Kontakt i dag'}:l));
      toast(`${toUpdate.length} leads hentet`);
    }
  };

  const onAction=async(id,newStatus)=>{
    const lead=leads.find(l=>l.id===id);
    if(!lead)return;
    let updates={status:newStatus};
    if(newStatus==='Venter'){
      const lvls=['Første kontakt','Oppfølging 1','Oppfølging 2','Oppfølging 3'];
      const nxts=['Oppfølging 1','Oppfølging 2','Oppfølging 3','Siste venting'];
      const i=lvls.indexOf(lead.level);
      updates.next_contact=fmtDate(addWeekdays(new Date(),i<=0?3:5));
      if(i>=0)updates.level=nxts[i];
    }
    if(newStatus==='Booket'){updates.status='Svart';updates.level='Møte booket';}
    if(newStatus==='Oppfølging'){updates.next_contact=fmtDate(addWeekdays(new Date(),7));}
    setLeads(prev=>prev.map(l=>l.id===id?{...l,...updates}:l));
    await sb.from('crm_leads').update(updates).eq('id',id);
  };

  // Flytt Oppfølging-lead manuelt til Kontakt i dag
  const moveToKontakt=async(id)=>{
    const updates={status:'Kontakt i dag',level:'Varm oppfølging',next_contact:null};
    setLeads(prev=>prev.map(l=>l.id===id?{...l,...updates}:l));
    await sb.from('crm_leads').update(updates).eq('id',id);
    toast('Flyttet til Kontakt i dag ✓');
  };

  // Oppdater lead lokalt (brukes av OppfolgingCard inline dato-lagring)
  const updateLeadLocally=lead=>{
    setLeads(prev=>prev.map(l=>l.id===lead.id?lead:l));
  };

  const saveLead=async(lead)=>{
    setSavingEdit(true);
    const {error}=await sb.from('crm_leads').update({
      name:lead.name,phone:lead.phone,website:lead.website,
      fb:lead.fb,ig:lead.ig,status:lead.status,level:lead.level,
      next_contact:lead.next_contact||null,note:lead.note,
      bransje:lead.bransje,by:lead.by
    }).eq('id',lead.id);
    setSavingEdit(false);
    if(!error){
      setLeads(prev=>prev.map(l=>l.id===lead.id?{...l,...lead}:l));
      setEditing(null);
      toast('Lagret ✓');
    } else {
      toast('Feil – prøv igjen');
    }
  };

  const filtered=leads
    .filter(l=>l.status===activeTab&&(l.name||'').toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>{
      // Oppfølging: overdue først, deretter nærmeste dato
      if(activeTab==='Oppfølging'){
        const td=todayStr();
        const aOver=a.next_contact&&a.next_contact<=td;
        const bOver=b.next_contact&&b.next_contact<=td;
        if(aOver&&!bOver)return -1;
        if(!aOver&&bOver)return 1;
        if(a.next_contact&&b.next_contact)return a.next_contact.localeCompare(b.next_contact);
        if(a.next_contact)return -1;
        if(b.next_contact)return 1;
      }
      return 0;
    });
  const cnts={};MAIN_TABS.forEach(t=>{cnts[t]=leads.filter(l=>l.status===t).length;});

  if(loading){
    return(
      <div className="loader-full">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--or)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{width:44,height:44}} className="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        <div style={{fontFamily:'Barlow Condensed',fontWeight:900,fontSize:22,color:'var(--g800)'}}>Henter leads...</div>
        <div style={{fontSize:13,color:'var(--g400)'}}>Kobler til Supabase</div>
      </div>
    );
  }

  return(
    <div className="app-shell">
      {/* HEADER */}
      <div className="appbar">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 24px 10px',gap:16}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{fontFamily:'Barlow Condensed',fontWeight:900,fontSize:28,background:'linear-gradient(135deg,var(--or),var(--re))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>AI-CRM</div>
            <span className={`dot-badge ${online?'':'red'}`} title={online?'Online':'Offline'}></span>
          </div>
          <div style={{display:'flex',gap:4,flexWrap:'wrap',justifyContent:'center'}}>
            {[['leads','Leads',<Ic.Users/>],['statistikk','Stats',<Ic.Bar/>],['meldinger','Meldinger',<Ic.Msg/>],['notater','Notater',<Ic.Note/>]].map(([id,lbl,ic])=>(
              <button key={id} className={`topnav ${navTab===id?'on':''}`} onClick={()=>setNavTab(id)}>{ic}{lbl}</button>
            ))}
          </div>
          <span style={{fontSize:12,fontWeight:600,color:'var(--g400)',background:'var(--glass)',WebkitBackdropFilter:'var(--blur)',backdropFilter:'var(--blur)',border:'1px solid var(--glass-brd)',borderRadius:9,padding:'5px 11px',whiteSpace:'nowrap'}}>{todayStr()}</span>
        </div>
        {navTab==='leads'&&(
          <div className="hs" style={{display:'flex',gap:7,padding:'8px 24px 12px',overflowX:'auto'}}>
            {MAIN_TABS.map(t=>(
              <button key={t} onClick={()=>setActiveTab(t)} className={activeTab===t?'tab-on':'tab-off'} style={{whiteSpace:'nowrap',padding:'7px 14px',borderRadius:999,fontSize:13,fontWeight:700,flexShrink:0,transition:'all .15s'}}>
                {t}{cnts[t]>0&&` (${cnts[t]})`}
              </button>
            ))}
          </div>
        )}
      </div>

      {KEY_MISSING&&<SetupBanner/>}
      {/* CONTENT */}
      {navTab==='leads'&&(
        <div style={{padding:'20px 24px 48px'}}>
          <div style={{position:'relative',marginBottom:13}}>
            <div style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'var(--g400)',width:18,height:18}}><Ic.Search/></div>
            <input className="fi" style={{paddingLeft:37}} placeholder="Søk etter bedrift..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          {activeTab==='LEADs'&&(
            <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center'}}>
              <div style={{display:'flex',alignItems:'center',background:'var(--glass)',WebkitBackdropFilter:'var(--blur)',backdropFilter:'var(--blur)',border:'1px solid var(--glass-brd)',borderRadius:12,overflow:'hidden',height:42,flex:'0 0 auto',boxShadow:'var(--glass-hi)'}}>
                {[10,20,30,50].map(n=>(
                  <button key={n} onClick={()=>setPullCount(n)} style={{padding:'0 12px',height:'100%',fontSize:13,fontWeight:700,background:pullCount===n?'var(--g900)':'transparent',color:pullCount===n?'white':'var(--g500)',borderRight:'1.5px solid var(--g200)',transition:'all .15s',whiteSpace:'nowrap'}}>
                    {n}
                  </button>
                ))}
              </div>
              <button className="bp" onClick={pullDailyLeads} style={{flex:1,height:42,fontSize:13}}>
                <Ic.Plus/>Hent til "Kontakt i dag"
              </button>
            </div>
          )}
          {activeTab==='LEADs'&&(
            <button className="bs" onClick={hentNyeLeads} disabled={henterNye} style={{width:'100%',height:42,fontSize:13,marginBottom:14,opacity:henterNye?0.6:1}}>
              <Ic.Plus/>{henterNye?'Henter nye bedrifter…':'Hent nye bedrifter (Google Places)'}
            </button>
          )}
          {filtered.length>0?(
          <div className="leadgrid">
          {filtered.map(l=>(
            activeTab==='Oppfølging'
              ? <OppfolgingCard key={l.id} lead={l} onEdit={setEditing} onMoveToKontakt={moveToKontakt} onSave={updateLeadLocally}/>
              : <LeadCard key={l.id} lead={l} activeTab={activeTab} onEdit={setEditing} onAction={onAction} messages={messages}/>
          ))}
          </div>
          ):(
            <div style={{textAlign:'center',padding:'48px 24px',background:'var(--glass)',WebkitBackdropFilter:'var(--blur)',backdropFilter:'var(--blur)',borderRadius:18,border:'1.5px dashed var(--glass-brd)',boxShadow:'var(--glass-hi)'}}>
              <div style={{color:'var(--g300)',marginBottom:8,display:'flex',justifyContent:'center'}}><Ic.Inbox/></div>
              <p style={{color:'var(--g400)',fontWeight:700,fontSize:14}}>Ingen leads i denne fanen akkurat nå.</p>
            </div>
          )}
        </div>
      )}
      {navTab==='statistikk'&&<Stats leads={leads}/>}
      {navTab==='meldinger'&&<MsgsTab messages={messages} setMessages={setMessages}/>}
      {navTab==='notater'&&<NotesTab/>}


      {editing&&<EditModal lead={editing} onClose={()=>setEditing(null)} onSave={saveLead} saving={savingEdit}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
